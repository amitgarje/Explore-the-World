<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Button</title>
  <style>
    body {
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .fancy-btn {
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      font-family: Verdana, Geneva, Tahoma, sans-serif;
      color: #4a0033;
      font-size: 18px;
      font-weight: bold;
      padding: 12px 30px;
      border-radius: 30px;
      border: none;
      cursor: pointer;
      box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
      transition: background 0.5s ease;
      position: relative;
    }

    .fancy-btn:hover {
      background: linear-gradient(135deg, #ff6a88, #ff99ac);
    }

    /* Animation keyframes */
    @keyframes moveRotate {
      0%   { transform: translateX(0) rotate(0deg); }
      50%  { transform: translateX(600px) rotate(360deg); } /* travel far right */
      100% { transform: translateX(0) rotate(0deg); }       /* return back */
    }

    /* Apply animation */
    .animate {
      animation: moveRotate 2s ease-in-out;
    }
  </style>
</head>
<body>
  <button class="fancy-btn" id="magicBtn">🚀 Apply Now</button>

  <script>
    const btn = document.getElementById("magicBtn");
    btn.addEventListener("click", () => {
      btn.classList.add("animate");
      // remove animation class after it finishes so it can run again on next click
      setTimeout(() => {
        btn.classList.remove("animate");
      }, 2000); // match animation duration
    });
  </script>
</body>
</html>
